<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer hex ring -->
  <polygon points="60,4 104,28 104,92 60,116 16,92 16,28" stroke="#00E5A0" stroke-width="2" fill="none" opacity="0.5"/>
  <polygon points="60,12 97,33 97,87 60,108 23,87 23,33" stroke="#00E5A0" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- Circuit traces from corners -->
  <line x1="60" y1="4"  x2="60" y2="18" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
  <line x1="104" y1="28" x2="92" y2="35" stroke="#00CCDD" stroke-width="1" opacity="0.5"/>
  <line x1="104" y1="92" x2="92" y2="85" stroke="#00CCDD" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="28" x2="28" y2="35" stroke="#00CCDD" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="92" x2="28" y2="85" stroke="#00CCDD" stroke-width="1" opacity="0.5"/>
  <!-- Circuit node dots -->
  <circle cx="60" cy="4"   r="2.5" fill="#00E5A0" opacity="0.9"/>
  <circle cx="104" cy="28" r="2"   fill="#00CCDD" opacity="0.7"/>
  <circle cx="104" cy="92" r="2"   fill="#00CCDD" opacity="0.7"/>
  <circle cx="16"  cy="28" r="2"   fill="#00CCDD" opacity="0.7"/>
  <circle cx="16"  cy="92" r="2"   fill="#00CCDD" opacity="0.7"/>
  <!-- Main robot head body -->
  <rect x="30" y="32" width="60" height="56" rx="8" fill="#030C14" stroke="#00E5A0" stroke-width="2"/>
  <!-- Inner glow fill -->
  <rect x="32" y="34" width="56" height="52" rx="6" fill="url(#innerGlow)" opacity="0.4"/>
  <!-- Forehead circuit trace -->
  <line x1="44" y1="32" x2="44" y2="26" stroke="#00E5A0" stroke-width="1.2" opacity="0.7"/>
  <line x1="44" y1="26" x2="76" y2="26" stroke="#00E5A0" stroke-width="1.2" opacity="0.7"/>
  <line x1="76" y1="26" x2="76" y2="32" stroke="#00E5A0" stroke-width="1.2" opacity="0.7"/>
  <circle cx="44" cy="26" r="2" fill="#00E5A0" opacity="0.9"/>
  <circle cx="76" cy="26" r="2" fill="#00E5A0" opacity="0.9"/>
  <!-- Antenna -->
  <line x1="60" y1="32" x2="60" y2="18" stroke="#00CCDD" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="60" cy="16" r="3.5" fill="#00E5A0" opacity="0.95"/>
  <circle cx="60" cy="16" r="6"   fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.4"/>
  <circle cx="60" cy="16" r="9"   fill="none" stroke="#00E5A0" stroke-width="0.7" opacity="0.2"/>
  <!-- Signal arcs from antenna -->
  <path d="M52 20 Q60 10 68 20" stroke="#00CCDD" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M47 23 Q60 8 73 23"  stroke="#00CCDD" stroke-width="0.7" fill="none" opacity="0.3"/>
  <!-- Eye sockets -->
  <rect x="37" y="45" width="18" height="14" rx="4" fill="#010810" stroke="#00CCDD" stroke-width="1.5"/>
  <rect x="65" y="45" width="18" height="14" rx="4" fill="#010810" stroke="#00CCDD" stroke-width="1.5"/>
  <!-- Eye pupils / scanners -->
  <rect x="41" y="49" width="10" height="6" rx="3" fill="#00E5A0" opacity="0.9"/>
  <rect x="69" y="49" width="10" height="6" rx="3" fill="#00E5A0" opacity="0.9"/>
  <!-- Eye highlight reflection -->
  <circle cx="44" cy="51" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="72" cy="51" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <!-- Nose / sensor array -->
  <rect x="55" y="63" width="10" height="5" rx="2" fill="#010810" stroke="#00CCDD" stroke-width="1" opacity="0.6"/>
  <circle cx="58" cy="65.5" r="1"  fill="#00CCDD" opacity="0.7"/>
  <circle cx="62" cy="65.5" r="1"  fill="#00CCDD" opacity="0.7"/>
  <!-- Mouth / speaker grill -->
  <rect x="36" y="72" width="48" height="10" rx="4" fill="#010810" stroke="#00E5A0" stroke-width="1.5"/>
  <line x1="42" y1="72" x2="42" y2="82" stroke="#00E5A0" stroke-width="0.8" opacity="0.4"/>
  <line x1="49" y1="72" x2="49" y2="82" stroke="#00E5A0" stroke-width="0.8" opacity="0.4"/>
  <line x1="56" y1="72" x2="56" y2="82" stroke="#00E5A0" stroke-width="0.8" opacity="0.4"/>
  <line x1="63" y1="72" x2="63" y2="82" stroke="#00E5A0" stroke-width="0.8" opacity="0.4"/>
  <line x1="70" y1="72" x2="70" y2="82" stroke="#00E5A0" stroke-width="0.8" opacity="0.4"/>
  <line x1="77" y1="72" x2="77" y2="82" stroke="#00E5A0" stroke-width="0.8" opacity="0.4"/>
  <!-- Mouth LED strip pulse -->
  <rect x="38" y="75" width="16" height="4" rx="2" fill="#00E5A0" opacity="0.7"/>
  <rect x="57" y="75" width="8"  height="4" rx="2" fill="#00CCDD" opacity="0.5"/>
  <rect x="68" y="75" width="12" height="4" rx="2" fill="#00E5A0" opacity="0.4"/>
  <!-- Ear studs left -->
  <rect x="24" y="46" width="6" height="20" rx="3" fill="#010810" stroke="#00CCDD" stroke-width="1.2"/>
  <circle cx="27" cy="50" r="2" fill="#00E5A0" opacity="0.8"/>
  <circle cx="27" cy="57" r="2" fill="#00CCDD" opacity="0.6"/>
  <circle cx="27" cy="64" r="2" fill="#00E5A0" opacity="0.5"/>
  <!-- Ear studs right -->
  <rect x="90" y="46" width="6" height="20" rx="3" fill="#010810" stroke="#00CCDD" stroke-width="1.2"/>
  <circle cx="93" cy="50" r="2" fill="#00E5A0" opacity="0.8"/>
  <circle cx="93" cy="57" r="2" fill="#00CCDD" opacity="0.6"/>
  <circle cx="93" cy="64" r="2" fill="#00E5A0" opacity="0.5"/>
  <!-- Bottom circuit traces -->
  <line x1="40" y1="88" x2="40" y2="96" stroke="#00CCDD" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="96" x2="80" y2="96" stroke="#00CCDD" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="96" x2="80" y2="88" stroke="#00CCDD" stroke-width="1" opacity="0.5"/>
  <circle cx="40" cy="96" r="2" fill="#00CCDD" opacity="0.6"/>
  <circle cx="80" cy="96" r="2" fill="#00CCDD" opacity="0.6"/>
  <!-- Script bracket decorations -->
  <text x="34" y="43" font-family="monospace" font-size="7" fill="#00E5A0" opacity="0.5">&lt;/&gt;</text>
  <text x="78" y="43" font-family="monospace" font-size="7" fill="#00CCDD" opacity="0.5">{ }</text>
  <!-- Corner bracket TL/BR -->
  <path d="M30 38 L30 32 L36 32" stroke="#00E5A0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M90 70 L90 88 L84 88" stroke="#00E5A0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Gradient defs -->
  <defs>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#00E5A0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00CCDD" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
